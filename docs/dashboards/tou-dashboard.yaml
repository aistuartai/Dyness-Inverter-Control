        - color: '#f97316'
          value: 30
        - color: '#eab308'
          value: 60
        - color: '#22c55e'
          value: 85
        - color: '#4ade80'
          value: 100
        smooth_transitions: false
        animation_duration: 800
        enable_shadow: false
        center_shadow: true
        center_shadow_blur: 8
        center_shadow_pulse: true
        center_shadow_pulse_duration: 1500
        center_shadow_pulse_min: 6000
