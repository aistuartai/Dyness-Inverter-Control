views:
- type: sections
  title: TOU Settings
  path: dyness-tou
  icon: mdi:battery-clock
  sections:
  - cards:
    - type: heading
      heading: Apply Manual Changes
      heading_style: title
    - type: custom:button-card
      entity: button.garage_dyness_cygni_stage_tou_changes
      name: 1. Stage & Preview
      icon: mdi:clipboard-check-outline
      show_state: false
      styles:
        card:
        - height: 124px
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - border-radius: 14px
        - background: 'linear-gradient(135deg, #1d4ed8, #3b82f6)'
        - box-shadow: 0 4px 14px rgba(59,130,246,0.45)
        icon:
        - color: white
        - width: 30%
        name:
        - color: white
        - font-weight: bold
        - font-size: 14px
        - white-space: normal
        - text-align: center
        - margin-top: 6px
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.garage_dyness_cygni_stage_tou_changes
        haptic: light
      grid_options:
        columns: 6
        rows: 2
    - type: custom:button-card
      entity: button.garage_dyness_cygni_confirm_apply_tou
      name: 2. Confirm & Apply
      icon: mdi:send-check
      show_state: false
      styles:
        card:
        - height: 124px
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - border-radius: 14px
        - background: 'linear-gradient(135deg, #c2410c, #f97316)'
        - box-shadow: 0 4px 14px rgba(249,115,22,0.45)
        icon:
        - color: white
        - width: 30%
        name:
        - color: white
        - font-weight: bold
        - font-size: 14px
        - white-space: normal
        - text-align: center
        - margin-top: 6px
      tap_action:
        action: call-service
        service: button.press
        target:
          entity_id: button.garage_dyness_cygni_confirm_apply_tou
        confirmation:
          text: Apply staged TOU changes to the device?
        haptic: warning
      grid_options:
        columns: 6
        rows: 2
    - type: heading
      heading: Master Off
      heading_style: title
    - type: custom:button-card
      entity: input_button.tou_disable_all_groups
      name: Disable All
      icon: mdi:battery-off-outline
      show_state: false
      styles:
        card:
        - height: 124px
        - display: flex
        - flex-direction: column
        - align-items: center
        - justify-content: center
        - border-radius: 14px
        - background: 'linear-gradient(135deg, #7f1d1d, #b91c1c)'
        - box-shadow: 0 4px 14px rgba(127,29,29,0.45)
        icon:
        - color: white
        - width: 30%
        name:
        - color: white
        - font-weight: bold
        - font-size: 14px
        - white-space: normal
        - text-align: center
        - margin-top: 6px
      tap_action:
        action: call-service
        service: input_button.press
        target:
          entity_id: input_button.tou_disable_all_groups
        confirmation:
          text: Disable ALL TOU groups (1-4)?
        haptic: warning
      grid_options:
        columns: 5
        rows: 2
  - type: grid
    cards:
    - type: heading
      heading_style: title
      heading: Quick Boost Configuration
    - square: false
      type: grid
      columns: 2
      cards:
      - type: tile
        entity: input_number.tou_boost_power
        name: Boost Power
        icon: mdi:battery-charging-high
        color: accent
        vertical: false
        features:
        - type: numeric-input
        features_position: bottom
      - type: tile
        entity: input_number.tou_boost_duration
        name: Boost Duration
        icon: mdi:timer-outline
        features:
        - type: numeric-input
    - square: false
      type: grid
      columns: 2
      cards:
      - type: custom:button-card
        entity: input_button.battery_boost_charge_5000w
        name: Activate Boost
        icon: mdi:battery-charging-high
        show_state: false
        styles:
          card:
          - height: 56px
          - border-radius: 14px
          - padding: 0 16px
          - background: 'linear-gradient(135deg, #16a34a, #22c55e)'
          - box-shadow: 0 4px 14px rgba(34,197,94,0.45)
          icon:
          - color: white
          - width: 22px
          name:
          - color: white
          - font-weight: bold
          - font-size: 13px
          - margin-left: 8px
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.battery_boost_charge_5000w
          haptic: light
        aspect_ratio: 4/1
        layout: icon_name
      - type: custom:button-card
        entity: input_button.abort_boost_charge
        name: Abort Boost
        icon: mdi:stop-circle-outline
        show_state: false
        styles:
          card:
          - height: 56px
          - border-radius: 14px
          - padding: 0 16px
          - background: 'linear-gradient(135deg, #b91c1c, #ef4444)'
          - box-shadow: 0 4px 14px rgba(239,68,68,0.45)
          icon:
          - color: white
          - width: 22px
          name:
          - color: white
          - font-weight: bold
          - font-size: 13px
          - margin-left: 8px
        tap_action:
          action: call-service
          service: input_button.press
          target:
            entity_id: input_button.abort_boost_charge
          confirmation:
            text: Abort the running boost charge?
          haptic: warning
        aspect_ratio: 4/1
        layout: icon_name
      - type: tile
        entity: automation.dyness_battery_boost_charge_5000w_1hr
        name: Boost Charge Available
        vertical: false
        features_position: bottom
  - type: grid
    cards:
    - type: conditional
      conditions:
