views:
- type: sections
  title: Settings
  path: dyness-settings
  icon: mdi:application-cog
  sections:
  - type: grid
    cards:
    - type: heading
      heading: Battery Limits
    - type: grid
      columns: 2
      square: false
      cards:
      - type: vertical-stack
        cards:
        - type: custom:mushroom-template-card
          primary: '{{ states(''sensor.garage_dyness_cygni_on_grid_discharge_depth'') }}%'
          icon: mdi:battery-check
          icon_color: deep-purple
          fill_container: true
          layout: horizontal
          secondary: On-Grid DoD Current Setting
          card_mod:
            style: 'ha-card .primary { font-size: 28px !important; font-weight: 800 !important; } ha-card .secondary { font-size: 14px !important; font-weight: 600 !important; }'
        - type: custom:mushroom-number-card
          entity: number.garage_dyness_cygni_on_grid_discharge_depth
          name: Set On-Grid DoD
          icon: mdi:battery-arrow-down
          display_mode: slider
          fill_container: true
          icon_color: purple
      - type: vertical-stack
        cards:
        - type: custom:mushroom-template-card
          primary: '{{ states(''sensor.garage_dyness_cygni_off_grid_discharge_depth'') }}%'
          icon: mdi:battery-check
          icon_color: purple
          fill_container: true
          layout: horizontal
          secondary: Off-Grid DoD Current Setting
          card_mod:
            style: 'ha-card .primary { font-size: 28px !important; font-weight: 800 !important; } ha-card .secondary { font-size: 14px !important; font-weight: 600 !important; }'
        - type: custom:mushroom-number-card
          entity: number.garage_dyness_cygni_off_grid_discharge_depth
          name: Set Off-Grid DoD
          icon: mdi:battery-arrow-down
          display_mode: slider
          fill_container: true
          icon_color: deep-purple
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_on_grid_charge_limit
        name: On-Grid Charge Limit
        icon: mdi:battery-arrow-up
        display_mode: slider
        fill_container: true
        icon_color: green
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_off_grid_charge_limit
        name: Off-Grid Charge Limit
        icon: mdi:battery-arrow-up
        display_mode: slider
        fill_container: true
        icon_color: lime
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: button.garage_dyness_cygni_stage_battery_settings
        name: 1. Stage & Preview
        icon: mdi:clipboard-check-outline
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #1d4ed8, #3b82f6)'
          - box-shadow: 0 4px 14px rgba(59,130,246,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_stage_battery_settings
          haptic: light
      - type: custom:button-card
        entity: button.garage_dyness_cygni_confirm_apply_battery_settings
        name: 2. Confirm & Apply
        icon: mdi:send-check
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #c2410c, #f97316)'
          - box-shadow: 0 4px 14px rgba(249,115,22,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_confirm_apply_battery_settings
          confirmation:
            text: Apply staged changes to the device?
          haptic: warning
  - type: grid
    cards:
    - type: heading
      heading: Peak Control
    - type: grid
      columns: 1
      square: false
      cards:
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_peak_control_supported
        name: Feature Supported
        icon: mdi:check-decagram
        tap_action:
          action: toggle
        icon_color: green
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_peak_control_enabled
        name: Peak Control Enabled
        icon: mdi:power
        tap_action:
          action: toggle
        icon_color: green
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_peak_control_trigger_soc
        name: Trigger SOC
        icon: mdi:battery-alert
        display_mode: slider
        fill_container: true
        icon_color: accent
      - type: custom:mushroom-entity-card
        entity: time.garage_dyness_cygni_peak_control_start
        name: Start Time
        icon: mdi:clock-start
        icon_color: lime
      - type: custom:mushroom-entity-card
        entity: time.garage_dyness_cygni_peak_control_end
        name: End Time
        icon: mdi:clock-end
        icon_color: lime
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_peak_control_power_limit
        name: Power Limit
        icon: mdi:lightning-bolt
        display_mode: slider
        fill_container: true
        icon_color: accent
      visibility:
      - condition: state
        entity: switch.garage_dyness_cygni_peak_control_supported
        state: 'on'
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: button.garage_dyness_cygni_stage_peak_control
        name: 1. Stage & Preview
        icon: mdi:clipboard-check-outline
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #1d4ed8, #3b82f6)'
          - box-shadow: 0 4px 14px rgba(59,130,246,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_stage_peak_control
          haptic: light
      - type: custom:button-card
        entity: button.garage_dyness_cygni_confirm_apply_peak_control
        name: 2. Confirm & Apply
        icon: mdi:send-check
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #c2410c, #f97316)'
          - box-shadow: 0 4px 14px rgba(249,115,22,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_confirm_apply_peak_control
          confirmation:
            text: Apply staged changes to the device?
          haptic: warning
      visibility:
      - condition: state
        entity: switch.garage_dyness_cygni_peak_control_supported
        state: 'on'
  - type: grid
    cards:
    - type: heading
      heading: Load Control
    - type: grid
      columns: 1
      square: false
      cards:
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_load_control_supported
        name: Feature Supported
        icon: mdi:check-decagram
        tap_action:
          action: toggle
        icon_color: green
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_load_switch
        name: Load Switch
        icon: mdi:power-socket
        tap_action:
          action: toggle
        icon_color: green
      - type: custom:mushroom-entity-card
        entity: time.garage_dyness_cygni_force_close_start
        name: Force Close Start
        icon: mdi:clock-start
        icon_color: lime
      - type: custom:mushroom-entity-card
        entity: time.garage_dyness_cygni_force_close_end
        name: Force Close End
        icon: mdi:clock-end
        icon_color: lime
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_force_close_off_grid_only
        name: Force Close Off-Grid Only
        icon: mdi:transmission-tower-off
        tap_action:
          action: toggle
        icon_color: purple
      - type: custom:mushroom-entity-card
        entity: switch.garage_dyness_cygni_always_close_on_grid
        name: Always Close On Grid
        icon: mdi:transmission-tower
        tap_action:
          action: toggle
        icon_color: purple
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_relay_close_soc
        name: Relay Close SOC
        icon: mdi:battery-arrow-up
        display_mode: slider
        fill_container: true
        icon_color: accent
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_relay_open_soc
        name: Relay Open SOC
        icon: mdi:battery-arrow-down
        display_mode: slider
        fill_container: true
        icon_color: deep-purple
      - type: custom:mushroom-number-card
        entity: number.garage_dyness_cygni_pv_power_threshold
        name: PV Power Threshold
        icon: mdi:solar-power
        display_mode: slider
        fill_container: true
        icon_color: accent
      visibility:
      - condition: state
        entity: switch.garage_dyness_cygni_load_control_supported
        state: 'on'
    - type: grid
      columns: 2
      square: false
      cards:
      - type: custom:button-card
        entity: button.garage_dyness_cygni_stage_load_control
        name: 1. Stage & Preview
        icon: mdi:clipboard-check-outline
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #1d4ed8, #3b82f6)'
          - box-shadow: 0 4px 14px rgba(59,130,246,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_stage_load_control
          haptic: light
      - type: custom:button-card
        entity: button.garage_dyness_cygni_confirm_apply_load_control
        name: 2. Confirm & Apply
        icon: mdi:send-check
        show_state: false
        styles:
          card:
          - height: 124px
          - display: flex
          - flex-direction: column
          - align-items: center
          - justify-content: center
          - border-radius: 14px
          - background: 'linear-gradient(135deg, #c2410c, #f97316)'
          - box-shadow: 0 4px 14px rgba(249,115,22,0.45)
          icon:
          - color: white
          - width: 30%
          name:
          - color: white
          - font-weight: bold
          - font-size: 14px
          - white-space: normal
          - text-align: center
          - margin-top: 6px
        tap_action:
          action: call-service
          service: button.press
          target:
            entity_id: button.garage_dyness_cygni_confirm_apply_load_control
          confirmation:
            text: Apply staged changes to the device?
          haptic: warning
      visibility:
      - condition: state
        entity: switch.garage_dyness_cygni_load_control_supported
        state: 'on'
  header:
    card:
      type: markdown
      text_only: true
      content: |
        ## ⚠️ WARNING
        **Values shown are NOT read from the inverter.** Defaults do not reflect current inverter settings. Verify every value before applying. Peak Control and Load Control will error if the **Feature Supported** switch is off.
  max_columns: 4
  cards: []
  show_icon_and_title: true
